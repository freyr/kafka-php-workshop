# Consume-side routing: message name => read-model DTO. Separate from the
# produce-side table — consumers own their read models, so this lists only the
# names this service consumes. Unknown names are ignored at runtime.
workshop:
    consumers:
        order.created: Workshop\App\Consumer\OrderCreatedDto
        order.updated: Workshop\App\Consumer\OrderUpdatedDto
        order.cancelled: Workshop\App\Consumer\OrderCancelledDto
        order.audited: Workshop\App\Consumer\OrderAuditedDto
