# Produce-side routing: message name => wire identity (topic + subject + schema).
# Every route is AVRO — the producer streams enveloped events encoded against
# Schema Registry. Subjects use RecordNameStrategy by default (the schema's
# fully-qualified record name, lower_snake component) and carry NO version marker
# — a breaking change mints a brand-new subject, never a vN suffix; the Block 9
# catalog route is the documented exception, using TopicNameStrategy
# (<topic>-value) for stock Kafka Connect interop (see that route's comment).
# order.* events share one topic; each registers its own subject. Schema paths
# resolve against %kafka.schema_dir%.
workshop:
    producers:
        order.created:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_created
            schema: '%kafka.schema_dir%/orders/OrderCreated.avsc'
        order.updated:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_updated
            schema: '%kafka.schema_dir%/orders/OrderUpdated.avsc'
        order.cancelled:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_cancelled
            schema: '%kafka.schema_dir%/orders/OrderCancelled.avsc'
        # Single-partition audit log for the consumer-group offsets demo
        # (demo:offsets:*). One partition → each consumer group's committed
        # offset tracks the stream 1:1, easy to read per group in kafka-ui.
        order.audited:
            topic: enet.ecommerce.audit
            subject: com.ecommerce.audit.order_audited
            schema: '%kafka.schema_dir%/audit/OrderAudited.avsc'
        # Block 4 schema-evolution playground — a flat, throwaway event on its own
        # topic. You edit this schema in place during the exercise.
        demo.order.evolved:
            topic: enet.demo.orders
            subject: com.ecommerce.demo.order_evolved
            schema: '%kafka.schema_dir%/demo/OrderEvolved.avsc'
        # Block 7 error-handling demo — produced only through the outbox
        # (aggregate_type=ErrorDemo), so the topic here is the relay's
        # destination (prefix + aggregate_type), stated for the record. The
        # route's real job is the subject + schema the AVRO encode resolves.
        error.demo:
            topic: enet.ecommerce.outbox.ErrorDemo
            subject: com.ecommerce.demo.error_demo
            schema: '%kafka.schema_dir%/demo/ErrorDemo.avsc'
        # Block 9 — catalog projection demo. A state-transfer (fat) event carrying
        # the product's FULL current state, placed only through the
        # product_catalog_state_change table (Debezium EventRouter → topic, bytes
        # pass-through). The loyalty side consumes it with ZERO PHP code: a Connect
        # JDBC sink decodes the AVRO and upserts products_projection. The topic here
        # is the EventRouter's pinned destination, stated for the
        # record; the route's real job is the subject + schema the AVRO encode
        # resolves. UNLIKE the other routes (RecordNameStrategy), this subject is
        # TopicNameStrategy (<topic>-value): the consumer is a STOCK Confluent
        # AvroConverter in the JDBC sink, and besides decoding by the frame's
        # schema id it resolves the schema's version under <topic>-value — a 404
        # there fails the sink task. Subject strategy is part of the consumer
        # contract; interop with stock tooling wins over the repo convention.
        # NOTE the underscore in projection_change: Symfony Config normalizes
        # DASHES in config keys to underscores at load time (dots survive), so
        # a key written catalog.projection-change would resolve as
        # catalog.projection_change anyway — it is written in that runtime form
        # here so the file matches what the routing table and
        # kafka:schema:register actually see. Only the TOPIC keeps its dashes.
        catalog.projection_change:
            topic: enet.product-catalog.projection-change
            subject: enet.product-catalog.projection-change-value
            schema: '%kafka.schema_dir%/catalog/ProjectionChange.avsc'
