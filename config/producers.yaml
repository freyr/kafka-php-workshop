# Produce-side routing: message name => wire identity (topic + subject + schema).
# Every route is AVRO — the producer streams enveloped events encoded against
# Schema Registry. Subjects use RecordNameStrategy (the schema's fully-qualified
# record name, lower_snake component) and carry NO version marker — a breaking
# change mints a brand-new subject, never a vN suffix. order.* events share one
# topic; each registers its own subject. Schema paths resolve against
# %kafka.schema_dir%.
workshop:
    producers:
        order.created:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_created
            schema: '%kafka.schema_dir%/orders/OrderCreated.avsc'
        order.updated:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_updated
            schema: '%kafka.schema_dir%/orders/OrderUpdated.avsc'
        order.cancelled:
            topic: enet.ecommerce.orders
            subject: com.ecommerce.orders.order_cancelled
            schema: '%kafka.schema_dir%/orders/OrderCancelled.avsc'
        # Single-partition audit log for the consumer-group offsets demo
        # (demo:offsets:*). One partition → each consumer group's committed
        # offset tracks the stream 1:1, easy to read per group in kafka-ui.
        order.audited:
            topic: enet.ecommerce.audit
            subject: com.ecommerce.audit.order_audited
            schema: '%kafka.schema_dir%/audit/OrderAudited.avsc'
        payment.processed:
            topic: enet.ecommerce.payments
            subject: com.ecommerce.payments.payment_processed
            schema: '%kafka.schema_dir%/payments/PaymentProcessed.avsc'
        inventory.reserved:
            topic: enet.ecommerce.inventory
            subject: com.ecommerce.inventory.inventory_reserved
            schema: '%kafka.schema_dir%/inventory/InventoryReserved.avsc'
        # Block 4 schema-evolution playground — a flat, throwaway event on its own
        # topic. You edit this schema in place during the exercise.
        demo.order.evolved:
            topic: enet.demo.orders
            subject: com.ecommerce.demo.order_evolved
            schema: '%kafka.schema_dir%/demo/OrderEvolved.avsc'
