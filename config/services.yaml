# Dependency-injection wiring, expressed as data. The producer and consumer
# routing tables live in their own files and are merged in via imports — each
# declares the `workshop:` namespace owned by WorkshopExtension.
imports:
    - { resource: producers.yaml }
    - { resource: consumers.yaml }

services:
    _defaults:
        autowire: true       # resolve constructor dependencies by type
        autoconfigure: true

    # Any Symfony Command is tagged so bin/console discovers it, and made public
    # so it can be fetched from the compiled container by id.
    _instanceof:
        Symfony\Component\Console\Command\Command:
            tags: ['console.command']
            public: true

    # PSR-4 autodiscovery for the pure php-rdkafka layer (Blocks 1-3). The value
    # objects, enums and callback/client wrappers are constructed by the factories
    # (never injected), so they are excluded.
    Workshop\Kafka\:
        resource: '../src/Kafka/'
        exclude:
            - '../src/Kafka/Config/ClientRole.php'
            - '../src/Kafka/Config/KafkaSetting.php'
            - '../src/Kafka/Config/KafkaProfile.php'
            - '../src/Kafka/Callback'
            - '../src/Kafka/Runtime/CommitPolicy.php'
            - '../src/Kafka/Runtime/RunLimits.php'
            - '../src/Kafka/Client/MessageProducer.php'
            - '../src/Kafka/Client/MessageConsumer.php'
            - '../src/Kafka/Client/RawProducer.php'

    Workshop\App\Console\:
        resource: '../src/App/Console/'

    # The Symfony-Serializer-backed denormalizer that turns a decoded payload into
    # a read-model DTO (the DtoRouting table is wired by WorkshopExtension).
    Workshop\App\Consumer\MessageDenormalizer: ~

    # The consumer application: decode a record, denormalize it into a typed DTO, then
    # hand it to the MessageBus, which routes the DTO to its one #[AsMessageHandler]
    # (MessageHandlerPass builds that routing table from the tagged handlers below).
    # Each is autowired by type; the value objects (ConsumedMessage, DecodedRecord) and
    # the Middleware interface are NOT services. MessageBus's handler locator argument
    # is filled by the compiler pass, not autowiring.
    Workshop\App\Consumer\MessageInterpreter: ~
    Workshop\App\Consumer\MessageBus: ~
    Workshop\App\Consumer\ConsoleWriter: ~
    Workshop\App\Consumer\EventDedup: ~
    # Maps a message name to its subject's latest registered schema (the reader
    # schema for kafka:consume --reader=latest). Autowires MessageRouting + the
    # registry client.
    Workshop\App\Consumer\LatestSchemaResolver: ~
    Workshop\App\Consumer\TransactionMiddleware: ~
    Workshop\App\Consumer\IdempotencyMiddleware: ~

    # The per-DTO handlers the MessageBus routes to. Each declares #[AsMessageHandler];
    # autoconfiguration tags it and MessageHandlerPass keys it by the DTO its __invoke
    # accepts. FieldPrintHandler is OrderEvolvedDto's handler — it prints fields (the
    # Block 4 schema-evolution view) instead of projecting. OrderAuditedDto has no
    # handler on purpose (decode-and-flow, project nothing).
    Workshop\App\Consumer\OrderCreatedHandler: ~
    Workshop\App\Consumer\OrderUpdatedHandler: ~
    Workshop\App\Consumer\OrderCancelledHandler: ~
    Workshop\App\Consumer\FieldPrintHandler: ~
    # Block 7 — ErrorDemoHandler narrates (no projection) and throws
    # TransientException while the failure-mode flag (runtime_flags row,
    # toggled by kafka:failure-mode) is on.
    Workshop\App\Consumer\ErrorDemoHandler: ~
    Workshop\App\Consumer\FailureModeSwitch: ~

    # The consumer's MySQL store. ConnectionFactory turns the DATABASE_URL parameter
    # into a DBAL Connection (the single construction seam); SchemaInstaller (autowired
    # with that Connection) provisions the tables for kafka:consume:setup.
    Workshop\Framework\Db\ConnectionFactory:
        arguments:
            $url: '%database.url%'

    Doctrine\DBAL\Connection:
        factory: ['@Workshop\Framework\Db\ConnectionFactory', 'create']

    Workshop\Framework\Db\SchemaInstaller: ~

    # Block 6 — the transactional outbox. OutboxPlacer wraps the order mutation
    # (OrderStateWriter) and the outbox append (OutboxRepository) in ONE DB
    # transaction; the same repository is the gateway outbox:relay polls and marks.
    # OutboxRecord and SimulatedCrash are value objects, never services, and the
    # relay's RawProducer is excluded from autodiscovery above — it is built by
    # ProducerFactory::createRaw, around a live \RdKafka\Producer.
    Workshop\Framework\Db\OutboxSchemaInstaller: ~
    Workshop\App\Outbox\OutboxRepository: ~
    Workshop\App\Outbox\OrderStateWriter: ~
    Workshop\App\Outbox\OutboxPlacer: ~

    # Resolves a message's wire name from its #[MessageName] attribute, caching the
    # class => name mapping so reflection runs once per type (produce-side only;
    # the Produce namespace is otherwise value objects, never services).
    Workshop\App\Producer\MessageNameResolver: ~

    # The buildable AVRO message catalog the `produce` command randomizes over (a
    # stateless lookup; like MessageNameResolver, the one service in an otherwise
    # value-object namespace).
    Workshop\App\Producer\MessageCatalog: ~

    # The wire is AVRO, so the MessageSerializer seam (injected by produce and
    # consume) resolves to the AvroSerializer. Commands that name the concrete
    # AvroSerializer directly are unaffected by this alias.
    Workshop\Kafka\Serde\MessageSerializer: '@Workshop\Kafka\Serde\AvroSerializer'

    # The Confluent AVRO serializer stack, wired as data. AvroSerializer used to
    # assemble this chain in its constructor; now it just receives the finished
    # RecordSerializer (autowired by type) and stays pure framing logic.
    GuzzleHttp\Client:
        arguments:
            - { base_uri: '%schema_registry.url%' }

    FlixTech\SchemaRegistryApi\Registry\PromisingRegistry:
        arguments: ['@GuzzleHttp\Client']

    FlixTech\SchemaRegistryApi\Registry\BlockingRegistry:
        arguments: ['@FlixTech\SchemaRegistryApi\Registry\PromisingRegistry']

    FlixTech\SchemaRegistryApi\Registry\Cache\AvroObjectCacheAdapter: ~

    FlixTech\SchemaRegistryApi\Registry\CachedRegistry:
        arguments:
            - '@FlixTech\SchemaRegistryApi\Registry\BlockingRegistry'
            - '@FlixTech\SchemaRegistryApi\Registry\Cache\AvroObjectCacheAdapter'

    FlixTech\AvroSerializer\Objects\RecordSerializer:
        arguments:
            $registry: '@FlixTech\SchemaRegistryApi\Registry\CachedRegistry'
            # Registration is OFF: the registry is a strict gate. Producers encode
            # only against schemas already registered out of band (schema:register);
            # an unregistered subject fails the encode instead of silently minting a
            # version from whatever a producer first sends.
            $options:
                !php/const FlixTech\AvroSerializer\Objects\RecordSerializer::OPTION_REGISTER_MISSING_SCHEMAS: false
                !php/const FlixTech\AvroSerializer\Objects\RecordSerializer::OPTION_REGISTER_MISSING_SUBJECTS: false

    # The Block 4 REST client gets its own Guzzle instance: a trailing-slash
    # base_uri so relative request paths resolve, and http_errors=false so it can
    # inspect a 404 (subject not registered yet) instead of catching an exception
    # for the expected "first version" case.
    schema_registry.http_client:
        class: GuzzleHttp\Client
        arguments:
            - { base_uri: '%schema_registry.url%/', http_errors: false }

    Workshop\Kafka\Serde\SchemaRegistryClient:
        arguments:
            $http: '@schema_registry.http_client'

    # The pure-rdkafka ConfBuilder needs the broker list as a string; the broker
    # probe interface resolves to its TCP implementation.
    Workshop\Kafka\Config\ConfBuilder:
        arguments:
            $brokers: '%kafka.brokers%'

    Workshop\Kafka\Config\BrokerProbe: '@Workshop\Kafka\Config\TcpBrokerProbe'

    # The enqueue (queue-interop) flavor of the same system — a cleanly separated
    # layer showing how a typical production enqueue setup is built: an fpm-style
    # producer, an outbox relay daemon, and a committing consumer, all reusing the
    # message classes, AVRO serde, routing tables, bus and dedup middleware above.
    # Only the commands and the context factory are services; RawBodySerializer is
    # constructed by the factory and the enqueue contexts/producers/consumers are
    # built at runtime per role.
    Workshop\Enqueue\Console\:
        resource: '../src/Enqueue/Console/'

    Workshop\Enqueue\EnqueueContextFactory:
        arguments:
            $brokers: '%kafka.brokers%'
